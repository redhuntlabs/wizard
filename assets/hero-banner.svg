<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="Wizard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0c0f24"/>
      <stop offset="55%"  stop-color="#141731"/>
      <stop offset="100%" stop-color="#22132a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffa5b8"/>
      <stop offset="50%"  stop-color="#ff6b85"/>
      <stop offset="100%" stop-color="#e63b5e"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffd9e1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#e63b5e" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#e63b5e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#ff7a92" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ff7a92" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <ellipse cx="240" cy="140" rx="320" ry="180" fill="url(#glow)"/>
  <ellipse cx="980" cy="140" rx="280" ry="160" fill="url(#glow2)"/>

  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="60"  x2="1200" y2="60"/>
    <line x1="0" y1="220" x2="1200" y2="220"/>
  </g>

  <g transform="translate(80,90)">
    <rect x="0" y="0" width="6" height="60" rx="3" fill="url(#accent)"/>
    <text x="22" y="46" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, sans-serif"
          font-size="56" font-weight="800" letter-spacing="-1.2" fill="url(#title)">
      Wizard
    </text>
    <text x="22" y="92" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, sans-serif"
          font-size="22" font-weight="500" letter-spacing="0.2" fill="#ff7a92">
      Build AI spells for what you do.
    </text>
    <text x="22" y="124" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="14" letter-spacing="2" fill="#ff8fa3" opacity="0.82">
      CLAUDE &#183; CURSOR &#183; CODEX &#183; GEMINI &#183; OPENCODE &#183; COPILOT
    </text>
  </g>

  <g transform="translate(940,70)" opacity="0.95">
    <circle cx="70" cy="70" r="64" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="70" cy="70" r="44" fill="none" stroke="#ff6b85" stroke-width="1" opacity="0.50"/>
    <circle cx="70" cy="70" r="22" fill="none" stroke="#ffa5b8" stroke-width="1" opacity="0.50"/>
    <g fill="#ffffff">
      <circle cx="70" cy="6"   r="4"/>
      <circle cx="134" cy="70" r="4"/>
      <circle cx="70" cy="134" r="4"/>
      <circle cx="6"  cy="70"  r="4"/>
      <circle cx="115" cy="25" r="3"/>
      <circle cx="115" cy="115" r="3"/>
      <circle cx="25"  cy="115" r="3"/>
      <circle cx="25"  cy="25"  r="3"/>
    </g>
    <circle cx="70" cy="70" r="9" fill="url(#accent)"/>
  </g>
</svg>
